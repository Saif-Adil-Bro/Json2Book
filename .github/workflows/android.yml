name: Android CI — Build Debug APK

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  actions: write          # required to upload artifacts

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (matches compileOptions in build.gradle.kts)
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"   # Eclipse Temurin — fast & reliable on GH runners

      # 3. Set up Gradle (also provisions a real `gradle` binary on PATH,
      #    used below to (re)generate the wrapper if it's missing/incomplete,
      #    and provides built-in dependency + wrapper caching)
      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
          cache-read-only: false

      # 4. Ensure the Gradle wrapper exists (gradlew + gradle-wrapper.jar).
      #    If the repo doesn't have a working wrapper committed, this
      #    regenerates it using the Gradle binary provisioned above.
      - name: 🔧 Generate / verify Gradle wrapper
        run: |
          if [ ! -f "./gradlew" ] || [ ! -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Wrapper missing or incomplete — generating with gradle 8.9"
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          else
            echo "Wrapper already present"
          fi

      # 5. Make Gradle wrapper executable
      - name: 🔐 Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # 6. Run lint check (non-blocking — report is uploaded as artifact)
      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      # 7. Upload lint report
      - name: 📋 Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      # 8. Build the debug APK
      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 9. Upload the APK so it can be downloaded from the Actions run summary
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DynamicBookReader-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30        # keep for 30 days

      # 10. Print build summary
      - name: ✅ Build summary
        run: |
          echo "### ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK artifact: **DynamicBookReader-debug-${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above ⬆️" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "**APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
